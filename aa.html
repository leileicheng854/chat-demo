<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>聊天窗口（支持图片、流式输出 & Markdown 渲染）</title>

  <!-- 代码高亮样式（dark 主题） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">

  <style>
    body {
      margin: 0;
      background: #0b1020;
      color: #eef1f7;
      font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      background: #121833;
      padding: 10px 16px;
      border-bottom: 1px solid #263056;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    header h2 {
      margin: 0;
      font-size: 16px;
      color: #cdd3f8;
      white-space: nowrap;
    }

    .settings {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .settings input {
      background: #0f1530;
      border: 1px solid #2b355f;
      border-radius: 8px;
      padding: 4px 8px;
      color: #eef1f7;
      width: 150px;
      font-size: 12px;
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 80%;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a2560;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #0f1a3f;
    }

    .msg img {
      max-width: 240px;
      border-radius: 8px;
      margin-top: 6px;
      border: 1px solid #2b355f;
    }

    footer {
      border-top: 1px solid #263056;
      background: #121833;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    footer textarea {
      flex: 1;
      background: #0f1530;
      color: #e9edf7;
      border: 1px solid #2b355f;
      border-radius: 10px;
      padding: 10px;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      font-size: 14px;
      line-height: 1.4;
    }

    footer textarea::placeholder {
      color: #5f678f;
    }

    footer input[type="file"] {
      display: none;
    }

    footer label {
      cursor: pointer;
      background: #2c355a;
      padding: 8px 12px;
      border-radius: 8px;
      color: #eef1f7;
      font-size: 13px;
      white-space: nowrap;
    }

    button {
      background: #2b6ef2;
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* === 单轮/多轮开关样式 ==== */
    .toggle-label {
      font-size: 12px;
      color: #cdd3f8;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      white-space: nowrap;
    }
    .toggle-label input {
      cursor: pointer;
    }

    /* Markdown 区域 */
    .msg.assistant .markdown-body {
      white-space: normal;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <header>
      <h2>💬 Chat 窗口（流式 & Markdown）</h2>
      <div class="settings">
        <input id="baseUrl" placeholder="Base URL" value="http://localhost:8080/v1" />
        <input id="apiKey" placeholder="API Key" type="password" />
        <input id="model" placeholder="模型ID" />
      </div>
    </header>

    <div id="chatWindow" class="chat-window"></div>

    <!-- ===== 输入框 + 图片 + 单轮开关 ===== -->
    <footer>
      <label for="imageUpload">📷 图片</label>
      <input id="imageUpload" type="file" accept="image/*" />

      <textarea id="userInput" placeholder="输入内容，回车发送（Ctrl+Enter 换行）"></textarea>

      <!-- 默认不勾选 = 单轮对话 -->
      <label class="toggle-label">
        <input id="memoryToggle" type="checkbox" />
        多轮对话
      </label>

      <button id="sendBtn">发送</button>
    </footer>
  </div>

  <!-- Markdown 渲染：marked -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- 代码高亮：highlight.js -->
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>

  <script>
    // ========= Markdown 渲染配置 =========
    if (window.marked) {
      marked.setOptions({
        breaks: true,
        highlight(code, lang) {
          try {
            const validLang = lang && hljs.getLanguage(lang) ? lang : 'plaintext';
            return hljs.highlight(code, { language: validLang }).value;
          } catch {
            return code;
          }
        }
      });
    }

    function renderMarkdown(text) {
      if (!text) return '';
      return `<div class="markdown-body">${marked.parse(text)}</div>`;
    }

    // ========= DOM 获取 =========
    const chatWindow = document.getElementById('chatWindow');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const imageInput = document.getElementById('imageUpload');

    const baseUrlEl = document.getElementById('baseUrl');
    const apiKeyEl = document.getElementById('apiKey');
    const modelEl = document.getElementById('model');

    const memoryToggle = document.getElementById('memoryToggle'); // 开关

    const state = { messages: [] };

    function appendMessage(role, text, imgSrc, isHtml = false) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = isHtml ? text : text;

      if (imgSrc) {
        const img = document.createElement('img');
        img.src = imgSrc;
        div.appendChild(img);
      }

      chatWindow.appendChild(div);
      chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
      return div;
    }

    function fileToBase64(file) {
      return new Promise(resolve => {
        if (!file) return resolve(null);
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      const baseUrl = baseUrlEl.value.trim().replace(/\/$/, '');
      const apiKey = apiKeyEl.value.trim();
      const model = modelEl.value.trim();

      if (!text && !imageInput.files[0]) return;

      sendBtn.disabled = true;

      const imgData = await fileToBase64(imageInput.files[0]);

      const content = [];
      if (text) content.push({ type: 'text', text });
      if (imgData) content.push({ type: 'image_url', image_url: { url: imgData } });

      const userMsg = { role: 'user', content };
      appendMessage('user', text, imgData);

      // 根据开关选择：多轮 / 单轮
      let messages;
      if (memoryToggle.checked) {
        state.messages.push(userMsg);
        messages = state.messages;
      } else {
        messages = [userMsg];
      }

      const assistantDiv = appendMessage('assistant', renderMarkdown(''), null, true);
      let assistantContent = '';

      try {
        const resp = await fetch(`${baseUrl}/chat/completions`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model,
            messages,
            stream: true
          })
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder('utf-8');

        let buffer = '';
        let doneAll = false;

        while (!doneAll) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop() || '';

          for (const part of parts) {
            const line = part.trim();
            if (!line.startsWith('data:')) continue;

            const data = line.slice(5).trim();
            if (data === '[DONE]') {
              doneAll = true;
              break;
            }

            try {
              const json = JSON.parse(data);
              const delta = json.choices?.[0]?.delta?.content || '';
              assistantContent += delta;
              assistantDiv.innerHTML = renderMarkdown(assistantContent);
              chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            } catch {}
          }
        }

        // 只有多轮模式才记录助手回复
        if (memoryToggle.checked) {
          state.messages.push({ role: 'assistant', content: assistantContent });
        }

      } finally {
        sendBtn.disabled = false;
        userInput.value = '';
        imageInput.value = '';
      }
    }

    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.ctrlKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);
  </script>
</body>
</html>
