<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>聊天窗口（支持图片、流式输出 & Markdown 渲染）</title>

  <!-- 代码高亮样式（dark 主题） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">

  <style>
    body {
      margin: 0;
      background: #0b1020;
      color: #eef1f7;
      font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      background: #121833;
      padding: 10px 16px;
      border-bottom: 1px solid #263056;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    header h2 {
      margin: 0;
      font-size: 16px;
      color: #cdd3f8;
      white-space: nowrap;
    }

    .settings {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .settings input {
      background: #0f1530;
      border: 1px solid #2b355f;
      border-radius: 8px;
      padding: 4px 8px;
      color: #eef1f7;
      width: 150px;
      font-size: 12px;
    }

    .settings input::placeholder {
      color: #5f678f;
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 80%;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a2560;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #0f1a3f;
    }

    /* 图片消息 */
    .msg img {
      max-width: 240px;
      border-radius: 8px;
      margin-top: 6px;
      border: 1px solid #2b355f;
    }

    footer {
      border-top: 1px solid #263056;
      background: #121833;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    footer textarea {
      flex: 1;
      background: #0f1530;
      color: #e9edf7;
      border: 1px solid #2b355f;
      border-radius: 10px;
      padding: 10px;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      font-size: 14px;
      line-height: 1.4;
    }

    footer textarea::placeholder {
      color: #5f678f;
    }

    footer input[type="file"] {
      display: none;
    }

    footer label {
      cursor: pointer;
      background: #2c355a;
      padding: 8px 12px;
      border-radius: 8px;
      color: #eef1f7;
      font-size: 13px;
      white-space: nowrap;
    }

    button {
      background: #2b6ef2;
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Markdown 渲染区域样式（主要作用在 assistant 气泡里） */
    .msg.assistant .markdown-body {
      white-space: normal;          /* Markdown 用自己的换行 */
      font-size: 14px;
    }

    .msg.assistant .markdown-body p {
      margin: 0 0 8px;
    }

    .msg.assistant .markdown-body code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      background: #050816;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .msg.assistant .markdown-body pre {
      background: #050816;
      border-radius: 8px;
      padding: 10px;
      overflow-x: auto;
      font-size: 13px;
      margin: 6px 0 10px;
    }

    .msg.assistant .markdown-body pre code {
      background: transparent;
      padding: 0;
    }

    .msg.assistant .markdown-body ul,
    .msg.assistant .markdown-body ol {
      padding-left: 1.4em;
      margin: 0 0 8px;
    }

    .msg.assistant .markdown-body h1,
    .msg.assistant .markdown-body h2,
    .msg.assistant .markdown-body h3,
    .msg.assistant .markdown-body h4 {
      margin: 8px 0 6px;
      font-weight: 600;
    }

    .msg.assistant .markdown-body a {
      color: #7aa2ff;
      text-decoration: underline;
    }

    /* 简单的“正在思考”闪烁效果（如果以后想加） */
    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    .typing-indicator {
      display: inline-block;
      animation: blink 1.2s infinite;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <header>
      <h2>💬 Chat 窗口（流式 & Markdown）</h2>
      <div class="settings">
        <input id="baseUrl" placeholder="Base URL" value="http://localhost:8080/v1" />
        <input id="apiKey" placeholder="API Key" type="password" />
        <input id="model" placeholder="模型ID" />
      </div>
    </header>

    <div id="chatWindow" class="chat-window"></div>

    <footer>
      <label for="imageUpload">📷 图片</label>
      <input id="imageUpload" type="file" accept="image/*" />
      <textarea id="userInput" placeholder="输入内容，回车发送（Ctrl+Enter 换行）"></textarea>
      <button id="sendBtn">发送</button>
    </footer>
  </div>

  <!-- Markdown 渲染：marked -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- 代码高亮：highlight.js（常用语言集合） -->
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>

  <script>
    // ========= Markdown 渲染配置 =========
    if (window.marked) {
      marked.setOptions({
        breaks: true,
        highlight(code, lang) {
          try {
            if (window.hljs) {
              const validLang = lang && hljs.getLanguage(lang) ? lang : 'plaintext';
              return hljs.highlight(code, { language: validLang }).value;
            }
          } catch (e) {
            console.error('highlight error:', e);
          }
          return code;
        }
      });
    }

    function renderMarkdown(text) {
      if (!text) return '';
      if (!window.marked) return text; // 兜底：库没加载成功就用纯文本
      const html = marked.parse(text);
      return `<div class="markdown-body">${html}</div>`;
    }

    // ========= DOM 获取 =========
    const chatWindow = document.getElementById('chatWindow');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const imageInput = document.getElementById('imageUpload');

    const baseUrlEl = document.getElementById('baseUrl');
    const apiKeyEl = document.getElementById('apiKey');
    const modelEl = document.getElementById('model');

    const state = { messages: [] };

    // role: 'user' | 'assistant'
    // isHtml: 是否把 text 当 html 插入（用于 assistant Markdown）
    function appendMessage(role, text, imgSrc, isHtml = false) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;

      if (text) {
        if (isHtml) {
          div.innerHTML = text;
        } else {
          div.textContent = text;
        }
      }

      if (imgSrc) {
        const img = document.createElement('img');
        img.src = imgSrc;
        div.appendChild(img);
      }

      chatWindow.appendChild(div);
      chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
      return div;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve(null);
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      const baseUrl = baseUrlEl.value.trim().replace(/\/$/, '');
      const apiKey = apiKeyEl.value.trim();
      const model = modelEl.value.trim();

      if (!baseUrl || !apiKey || !model) {
        alert('请填写 Base URL、API Key、模型ID');
        return;
      }
      if (!text && !imageInput.files[0]) return;

      sendBtn.disabled = true;

      // 图片转 base64
      const imgData = await fileToBase64(imageInput.files[0]);

      // OpenAI 兼容格式：多模态 content
      const content = [];
      if (text) content.push({ type: 'text', text });
      if (imgData) content.push({ type: 'image_url', image_url: { url: imgData } });

      const userMsg = { role: 'user', content };
      appendMessage('user', text, imgData);
      state.messages.push(userMsg);

      // 先插入一个空的 assistant 气泡，用于流式更新
      const assistantDiv = appendMessage('assistant', renderMarkdown(''), null, true);
      let assistantContent = '';

      try {
        const resp = await fetch(`${baseUrl}/chat/completions`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model,
            messages: state.messages,
            stream: true        // 关键：打开流式
          })
        });

        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}`);
        }

        const contentType = resp.headers.get('content-type') || '';

        // 如果服务器不支持 SSE，fallback 成非流式（兼容老服务）
        if (!contentType.includes('text/event-stream')) {
          const json = await resp.json();
          assistantContent = json.choices?.[0]?.message?.content || '无回复';
          assistantDiv.innerHTML = renderMarkdown(assistantContent);
        } else {
          // SSE 流式解析
          const reader = resp.body.getReader();
          const decoder = new TextDecoder('utf-8');
          let buffer = '';
          let doneAll = false;

          while (!doneAll) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });

            // 按事件块分割（通常以 \n\n 分割）
            const parts = buffer.split('\n\n');
            // 最后一块可能是不完整的，暂留在 buffer
            buffer = parts.pop() || '';

            for (const part of parts) {
              const lines = part.split('\n').map(l => l.trim()).filter(Boolean);
              for (const line of lines) {
                if (!line.startsWith('data:')) continue;
                const data = line.slice('data:'.length).trim();
                if (data === '[DONE]') {
                  doneAll = true;
                  break;
                }
                try {
                  const json = JSON.parse(data);
                  const delta = json.choices?.[0]?.delta?.content || '';
                  if (delta) {
                    assistantContent += delta;
                    assistantDiv.innerHTML = renderMarkdown(assistantContent);
                    chatWindow.scrollTo({
                      top: chatWindow.scrollHeight,
                      behavior: 'smooth'
                    });
                  }
                } catch (e) {
                  console.error('解析 SSE data 出错：', e, data);
                }
              }
              if (doneAll) break;
            }
          }
        }

        // 把完整助手消息加入对话上下文，方便继续多轮
        if (assistantContent) {
          state.messages.push({
            role: 'assistant',
            content: assistantContent
          });
        } else {
          assistantDiv.innerHTML = renderMarkdown('（无回复内容）');
        }
      } catch (err) {
        console.error(err);
        assistantDiv.innerHTML = renderMarkdown('❌ 出错：' + (err.message || err));
      } finally {
        sendBtn.disabled = false;
        userInput.value = '';
        imageInput.value = '';
      }
    }

    // 回车发送，Ctrl+Enter 换行
    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.ctrlKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);
  </script>
</body>
</html>
