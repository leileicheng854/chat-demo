<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>聊天窗口（支持图片 & OpenAI 兼容）</title>
  <style>
    body { margin: 0; background: #0b1020; color: #eef1f7; font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .chat-container { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; }
    header { background: #121833; padding: 10px 16px; border-bottom: 1px solid #263056; display: flex; justify-content: space-between; align-items: center; }
    header h2 { margin: 0; font-size: 16px; color: #cdd3f8; }
    .settings { display: flex; gap: 8px; }
    .settings input { background: #0f1530; border: 1px solid #2b355f; border-radius: 8px; padding: 4px 8px; color: #eef1f7; width: 150px; }
    .chat-window { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; line-height: 1.5; white-space: pre-wrap; }
    .msg.user { align-self: flex-end; background: #1a2560; }
    .msg.assistant { align-self: flex-start; background: #0f1a3f; }
    .msg img { max-width: 240px; border-radius: 8px; margin-top: 6px; border: 1px solid #2b355f; }
    footer { border-top: 1px solid #263056; background: #121833; padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
    footer textarea { flex: 1; background: #0f1530; color: #e9edf7; border: 1px solid #2b355f; border-radius: 10px; padding: 10px; resize: none; min-height: 48px; }
    footer input[type="file"] { display: none; }
    footer label { cursor: pointer; background: #2c355a; padding: 8px 12px; border-radius: 8px; color: #eef1f7; font-size: 13px; }
    button { background: #2b6ef2; border: none; color: white; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <header>
      <h2>💬 Chat 窗口（支持图片 & OpenAI 兼容）</h2>
      <div class="settings">
        <input id="baseUrl" placeholder="Base URL" value="http://localhost:8080/v1" />
        <input id="apiKey" placeholder="API Key" type="password" />
        <input id="model" placeholder="模型ID" />
      </div>
    </header>

    <div id="chatWindow" class="chat-window"></div>

    <footer>
      <label for="imageUpload">📷 图片</label>
      <input id="imageUpload" type="file" accept="image/*" />
      <textarea id="userInput" placeholder="输入内容，回车发送（Ctrl+Enter 换行）"></textarea>
      <button id="sendBtn">发送</button>
    </footer>
  </div>

  <script>
    const chatWindow = document.getElementById('chatWindow');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const imageInput = document.getElementById('imageUpload');

    const baseUrlEl = document.getElementById('baseUrl');
    const apiKeyEl = document.getElementById('apiKey');
    const modelEl = document.getElementById('model');

    const state = { messages: [] };

    function appendMessage(role, text, imgSrc) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      if (text) div.textContent = text;
      if (imgSrc) {
        const img = document.createElement('img');
        img.src = imgSrc;
        div.appendChild(img);
      }
      chatWindow.appendChild(div);
      chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve(null);
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      const baseUrl = baseUrlEl.value.trim().replace(/\/$/, '');
      const apiKey = apiKeyEl.value.trim();
      const model = modelEl.value.trim();

      if (!baseUrl || !apiKey || !model) {
        alert('请填写 Base URL、API Key、模型ID');
        return;
      }
      if (!text && !imageInput.files[0]) return;

      sendBtn.disabled = true;

      const imgData = await fileToBase64(imageInput.files[0]);
      const content = [];
      if (text) content.push({ type: 'text', text });
      if (imgData) content.push({ type: 'image_url', image_url: { url: imgData } });

      const userMsg = { role: 'user', content };
      appendMessage('user', text, imgData);
      state.messages.push(userMsg);

      try {
        const resp = await fetch(`${baseUrl}/chat/completions`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ model, messages: state.messages, stream: false })
        });

        const json = await resp.json();
        const reply = json.choices?.[0]?.message?.content || '无回复';
        appendMessage('assistant', reply);
        state.messages.push({ role: 'assistant', content: reply });
      } catch (err) {
        appendMessage('assistant', '❌ 出错: ' + err.message);
      } finally {
        sendBtn.disabled = false;
        userInput.value = '';
        imageInput.value = '';
      }
    }

    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.ctrlKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);
  </script>
</body>
</html>
